<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undisputed - Built For Champions</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden; 
        }

    
        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 5%;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 100px; 
            width: auto;
            transition: height 0.3s ease;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            margin: 0 18px;
            letter-spacing: 1.5px;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s ease;
        }

        .nav-links a:hover {
            border-bottom: 2px solid #fff;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center; 
        }

        .nav-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .nav-icons img {
            height: 22px; 
            width: auto;
            object-fit: contain;
            filter: invert(0); 
        }

        .nav-icons a:hover {
            transform: scale(1.15);
        }

   
        .menu-toggle {
            display: none; 
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 25; 
        }

        .menu-toggle span {
            width: 100%;
            height: 2px;
            background-color: #fff;
            transition: all 0.3s ease;
        }

  
        .search-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .search-input-field {
            width: 0px;
            opacity: 0;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid transparent;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 6px 0px;
            outline: none;
            border-radius: 20px;
            letter-spacing: 0.5px;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        opacity 0.3s ease, 
                        padding 0.3s ease,
                        border-color 0.3s ease;
        }

        .search-container.active .search-input-field {
            width: 220px;
            opacity: 1;
            padding: 6px 15px;
            margin-right: 10px;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }

        .search-container.active .search-input-field:focus {
            border-color: #f5b95c; 
        }

        .cart-icon-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .cart-badge {
            position: absolute;
            top: -7px;
            right: -9px;
            background-color: #f5b95c;
            color: #000;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.68rem;
            font-weight: 900;
            min-width: 17px;
            height: 17px;
            padding: 0 4px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 0 0 2px #000;
            pointer-events: none;
        }

    
        .hero-section {
            position: relative;        
            min-height: 100vh; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: url('https://surl.li/ddcjjd') center center/cover no-repeat; 
            background-color: #000;
            
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2; 
            padding: 140px 24px 60px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            max-width: 900px;
        }

        .hero-title {
            font-size: 4.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 4px 15px rgba(0, 0, 0, 0.8);
            line-height: 1.1;
        }

        .subtitle {
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-shadow: 2px 4px 15px #000;
            line-height: 1.5;
            color: #e6e6e6;
        }

        .cta-button {
            display: inline-block;
            background-color: #1a1a1a;
            color: #fff;
            text-decoration: none;
            padding: 16px 50px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: 50px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.4);
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .cta-button:hover {
            background-color: #2b2b2b;
            transform: scale(1.03);
        }

        .next-section {
            background-color: #0b0b0b; 
            color: #fff;
            padding: 80px 5%;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .next-section h2 {
            font-size: 2.4rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .next-section p {
            font-size: 1.05rem;
            color: #b3b3b3;
            max-width: 650px;
            margin: 0 auto 35px auto;
            line-height: 1.7;
        }

        .footer-social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border: 2px solid #fff;
            border-radius: 50%;
            background-color: transparent;
            color: #fff;
            text-decoration: none;
            transition: background-color 0.3s ease, color 0.3s ease, transform 0.2s ease;
        }

        .social-icon-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .social-icon-btn:hover {
            background-color: #fff;
            color: #000;
            transform: translateY(-4px);
        }

        .contact p {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 25px;
            font-size: 0.95rem;
            letter-spacing: 1px;
            color: #888;
        }

 
        @media (max-width: 1024px) {
            .hero-title {
                font-size: 3.5rem;
            }
            .navbar {
                padding: 20px 5%;
            }
            .logo img {
                height: 80px;
            }
            .nav-links a {
                margin: 0 10px;
                font-size: 0.8rem;
            }
        }

     
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex; 
            }

            
            .nav-links {
                position: fixed;
                top: 0;
                left: -100%;
                width: 80%;
                max-width: 300px;
                height: 100vh;
                background-color: #090909;
                border-right: 1px solid #222;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: flex-start;
                padding: 40px;
                gap: 30px;
                z-index: 20;
                transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            }

            .nav-links.open {
                left: 0;
            }

            .nav-links a {
                margin: 0;
                font-size: 1.1rem;
                letter-spacing: 2px;
                width: 100%;
                padding-bottom: 8px;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }

        
            .menu-toggle.open span:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }
            .menu-toggle.open span:nth-child(2) {
                opacity: 0;
            }
            .menu-toggle.open span:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }

            .search-container.active .search-input-field {
                width: 130px; 
            }

            .hero-title {
                font-size: 2.3rem;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 1rem;
                letter-spacing: 1.5px;
            }

            .cta-button {
                padding: 14px 35px;
                font-size: 0.85rem;
            }

            .next-section h2 {
                font-size: 1.8rem;
            }
            
            .next-section p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation Menu">
            <span></span>

        <nav class="nav-links" id="navLinks">

    <script>
        document.addEventListener('DOMContentLoaded', () => {
       
            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');

            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                menuToggle.classList.toggle('open');
                navLinks.classList.toggle('open');
            });

         
            document.addEventListener('click', (e) => {
                if (!navLinks.contains(e.target) && !menuToggle.contains(e.target)) {
                    menuToggle.classList.remove('open');
                    navLinks.classList.remove('open');
                }
            });

            // Sliding Header Search Input Controls
            const searchContainer = document.getElementById('searchContainer');
            const searchToggleBtn = document.getElementById('searchToggleBtn');
            const searchInput = document.getElementById('searchInput');

            searchToggleBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                searchContainer.classList.toggle('active');
                if (searchContainer.classList.contains('active')) {
                    searchInput.focus();
                } else {
                    searchInput.value = '';
                }
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const query = searchInput.value.trim();
                    if (query.length > 0) {
                        window.location.href = `all products.html?search=${encodeURIComponent(query)}`;
                    }
                }
            });

            document.addEventListener('click', (e) => {
                if (!searchContainer.contains(e.target) && searchContainer.classList.contains('active')) {
                    searchContainer.classList.remove('active');
                    searchInput.value = '';
                }
            });
        });
    </script>

    <script>
 
        const images = [
            'https://surl.li/ddcjjd',          
            'https://surl.lt/kekvxx',          
            'https://surl.li/hyhbxg'            
        ];

        let currentIndex = 0;
        const heroSection = document.querySelector('.hero-section');

        images.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        function changeBackground() {
            currentIndex = (currentIndex + 1) % images.length;
            heroSection.style.backgroundImage = `url('${images[currentIndex]}')`;
        }
      
        setInterval(changeBackground, 1500); 
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateCartBadgeCount();

            function updateCartBadgeCount() {
                const cartBadge = document.getElementById('cartBadge');
                if (!cartBadge) return;

                const cart = JSON.parse(localStorage.getItem('undisputedCart')) || [];
                const totalItems = cart.reduce((total, item) => total + (item.quantity || 0), 0);

                if (totalItems > 0) {
                    cartBadge.textContent = totalItems;
                    cartBadge.style.display = 'flex';
                } else {
                    cartBadge.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
