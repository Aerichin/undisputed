<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Undisputed</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0e0e0e; 
            color: #fff; 
            overflow-x: hidden;
            overflow-y: scroll; 
        }

        .navbar {
            position: relative; 
            background-color: #0b0a08; 
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 5%;
            z-index: 10;
            border-bottom: 1px solid #222;
            overflow: hidden; 
        }

        .navbar::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.daznservices.com/di/library/DAZN_News/60/63/naoya-inoue-celebration-getty-ftr_1mfvvkpdvhatg1m230gm6k0kye.jpg?t=1093973425') center center/cover no-repeat;
            opacity: 0.25; 
            z-index: -1; 
        }

        .logo, .nav-links, .nav-icons {
            position: relative;
            z-index: 2;
        }

        .logo-wrapper {
            display: inline-block;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            margin: 0 18px;
            letter-spacing: 1.5px;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s ease;
        }

        .nav-links a:hover {
            border-bottom: 2px solid #fff;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center; 
        }

        .nav-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            position: relative; 
        }

        .nav-icons img {
            height: 22px; 
            width: auto;
            object-fit: contain;
            filter: invert(0); 
        }

        .nav-icons a:hover {
            transform: scale(1.15);
        }

        .cart-badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background-color: #f5b95c;
            color: #000;
            font-size: 0.7rem;
            font-weight: 900;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
            border: 1.5px solid #0b0a08;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        .cart-badge.active {
            opacity: 1;
            transform: scale(1);
        }

        .signout-nav-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            display: none; 
        }

        .signout-nav-btn:hover {
            background-color: #fff;
            color: #000;
            border-color: #fff;
        }

        .login-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 5% 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-header {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 60px;
            color: #fff;
            text-align: center;
        }

        .login-form {
            width: 100%;
            max-width: 550px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-group {
            width: 100%;
            display: grid;
            grid-template-columns: 140px 1fr;
            align-items: center;
            margin-bottom: 40px;
            text-align: left;
        }

        .form-label {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 400;
            padding: 8px 4px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group:focus-within .form-label {
            color: #f5b95c;
        }

        .form-input:focus {
            border-bottom: 1px solid #f5b95c;
            box-shadow: 0 1px 0 #f5b95c;
        }

        .form-input:-webkit-autofill,
        .form-input:-webkit-autofill:hover, 
        .form-input:-webkit-autofill:focus, 
        .form-input:-webkit-autofill:active {
            -webkit-text-fill-color: #fff !important; 
            transition: background-color 5000s ease-in-out 0s; 
            box-shadow: inset 0 0 0 50px #0e0e0e !important; 
        }

        .submit-action-btn {
            background-color: #f5b95c;
            color: #000;
            border: none;
            width: 100%;
            max-width: 280px;
            padding: 16px 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            margin-top: 15px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .submit-action-btn:hover {
            background-color: #e0aa53;
        }

        .submit-action-btn:active {
            transform: scale(0.98);
        }

        .logged-in-msg {
            font-size: 1.2rem;
            font-weight: 700;
            color: #a0a0a0;
            text-align: center;
            padding: 40px 0;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 25;
        }

        .menu-toggle span {
            width: 100%;
            height: 2px;
            background-color: #fff;
            transition: all 0.3s ease;
        }

        @media (max-width: 1200px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr); 
                column-gap: 20px;
            }
        }

        @media (max-width: 1024px) {
            .banner-title {
                font-size: 3.5rem;
            }
            .navbar {
                padding: 20px 5%;
            }
            .nav-links a {
                margin: 0 10px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex; 
            }

            .nav-links {
                position: fixed;
                top: 0;
                left: -100%;
                width: 80%;
                max-width: 300px;
                height: 100vh;
                background-color: #090909;
                border-right: 1px solid #222;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: flex-start;
                padding: 40px;
                gap: 30px;
                z-index: 20;
                transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            }

            .nav-links.open {
                left: 0;
            }

            .nav-links a {
                margin: 0;
                font-size: 1.1rem;
                letter-spacing: 2px;
                width: 100%;
                padding-bottom: 8px;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }

            .menu-toggle.open span:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }
            .menu-toggle.open span:nth-child(2) {
                opacity: 0;
            }
            .menu-toggle.open span:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }

            .search-container.active .search-input-field {
                width: 130px; 
            }

            .banner-title {
                font-size: 2.3rem;
                letter-spacing: 2px;
            }

            .product-grid {
                grid-template-columns: repeat(2, 1fr); 
                column-gap: 15px;
                row-gap: 35px;
            }

            .product-image-wrapper {
                height: auto;
                padding: 15px;
            }

            .product-price {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="logo">
            <a href="undisputed.html" class="logo-wrapper">
                <img src="assets/undisputed_logo.png" alt="Undisputed Logo" style="height: 100px; width: auto;">
            </a>
        </div>
        <nav class="nav-links">
            <a href="all products.html">ALL PRODUCTS</a>
            <a href="gloves.html">GLOVES</a>
            <a href="protection.html">PROTECTION</a>
            <a href="footwear.html">FOOTWEAR</a>
        </nav>

        <div class="nav-icons">
            <a href="all products.html" aria-label="Search"><img src="assets/search-icon.png" alt="Search"></a>
            <a href="#" aria-label="Profile"><img src="assets/account-icon.png" alt="Account"></a>
            <a href="cart.html" aria-label="Cart">
                <img src="assets/cart-icon.png" alt="Cart">
                <span class="cart-badge" id="cartBadge">0</span>
            </a>
            <button class="signout-nav-btn" id="signOutBtn" type="button">Sign Out</button>
        </div>
    </header>

    <main class="login-wrapper">
        <h1 class="login-header">LOGIN</h1>
        
        <div id="loginContentBox" style="width: 100%; display: flex; justify-content: center;">
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="firstName" class="form-label">First Name:</label>
                    <input type="text" id="firstName" class="form-input" required autocomplete="given-name">
                </div>
                
                <div class="form-group">
                    <label for="lastName" class="form-label">Last Name:</label>
                    <input type="text" id="lastName" class="form-input" required autocomplete="family-name">
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" id="email" class="form-input" required autocomplete="email">
                </div>
                
                <button class="submit-action-btn" type="submit">Sign In</button>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.querySelector('.nav-links'); 

            const loginContentBox = document.getElementById('loginContentBox');
            const signOutBtn = document.getElementById('signOutBtn');
            const badge = document.getElementById('cartBadge');

            if (menuToggle && navLinks) {
                menuToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    menuToggle.classList.toggle('open');
                    navLinks.classList.toggle('open');
                });

                document.addEventListener('click', (e) => {
                    if (!navLinks.contains(e.target) && !menuToggle.contains(e.target)) {
                        menuToggle.classList.remove('open');
                        navLinks.classList.remove('open');
                    }
                });
            }

            function checkUserAuthSession() {
                const sessionEmail = localStorage.getItem('undisputed_email');
                const sessionFirstName = localStorage.getItem('undisputed_firstName');

                if (sessionEmail && sessionFirstName) {
                    if (signOutBtn) signOutBtn.style.display = 'block';
                    if (loginContentBox) {
                        loginContentBox.innerHTML = `
                            <div class="logged-in-msg">
                                Welcome back, <span style="color: #f5b95c;">${sessionFirstName}</span>! You are currently signed in.
                            </div>
                        `;
                    }
                } else {
                    if (signOutBtn) signOutBtn.style.display = 'none';
                }
            }

            checkUserAuthSession();

            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                const firstNameInput = document.getElementById('firstName');
                const lastNameInput = document.getElementById('lastName');
                const emailInput = document.getElementById('email');

                if (localStorage.getItem('undisputed_firstName') && firstNameInput) {
                    firstNameInput.value = localStorage.getItem('undisputed_firstName');
                }
                if (localStorage.getItem('undisputed_lastName') && lastNameInput) {
                    lastNameInput.value = localStorage.getItem('undisputed_lastName');
                }
                if (localStorage.getItem('undisputed_email') && emailInput) {
                    emailInput.value = localStorage.getItem('undisputed_email');
                }

                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();

                    const firstName = firstNameInput.value.trim();
                    const lastName = lastNameInput.value.trim();
                    const email = emailInput.value.trim();

                    localStorage.setItem('undisputed_firstName', firstName);
                    localStorage.setItem('undisputed_lastName', lastName);
                    localStorage.setItem('undisputed_email', email);

                    window.location.href = 'all products.html';
                });
            }

            if (signOutBtn) {
                signOutBtn.addEventListener('click', () => {
                    localStorage.removeItem('undisputed_firstName');
                    localStorage.removeItem('undisputed_lastName');
                    localStorage.removeItem('undisputed_email');
                    window.location.reload();
                });
            }

            function updateCartBadgeCount() {
                if (!badge) return;
                const cart = JSON.parse(localStorage.getItem('undisputedCart')) || [];
                const totalItems = cart.reduce((total, item) => total + (item.quantity || 0), 0);

                if (totalItems > 0) {
                    badge.textContent = totalItems;
                    badge.classList.add('active');
                } else {
                    badge.classList.remove('active');
                }
            }

            updateCartBadgeCount();
        });
    </script>
</body>
</html>
