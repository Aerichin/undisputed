<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undisputed - Footwear Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
     <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #000; 
            color: #fff;
            overflow-x: hidden;
            overflow-y: scroll; 
        }

        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 5%;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0));
        }

        .logo-wrapper {
            display: inline-block;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            margin: 0 18px;
            letter-spacing: 1.5px;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s ease;
        }

        .nav-links a:hover {
            border-bottom: 2px solid #fff;
        }

         .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center; 
        }

        .nav-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .nav-icons img {
            height: 22px; 
            width: auto;
            object-fit: contain;
            filter: invert(0); 
        }

        .nav-icons a:hover {
            transform: scale(1.15);
        }

  
        .search-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        .search-input-field {
            width: 0px;
            opacity: 0;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid transparent;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 6px 0px;
            outline: none;
            border-radius: 20px;
            letter-spacing: 0.5px;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        opacity 0.3s ease, 
                        padding 0.3s ease,
                        border-color 0.3s ease;
        }

        .search-container.active .search-input-field {
            width: 220px;
            opacity: 1;
            padding: 6px 15px;
            margin-right: 10px;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .search-container.active .search-input-field:focus {
            border-color: #f5b95c; 
        }

         .cart-icon-wrapper {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .cart-badge {
            position: absolute;
            top: -7px;
            right: -9px;
            background-color: #f5b95c; 
            color: #000;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.68rem;
            font-weight: 900;
            min-width: 17px;
            height: 17px;
            padding: 0 4px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 0 0 2px #000; 
            pointer-events: none; 
        }

        .collection-banner {
            position: relative;
            height: 40vh; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden; 
        }

        .collection-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('https://www.boxupnation.com/cdn/shop/articles/DAF_BoxUpNation-81.png?v=1731430494&width=900') center center/cover no-repeat; 
            opacity: 0.4; 
            z-index: 1;
        }

        .banner-title {
            position: relative;
            z-index: 2; 
            font-size: 4.8rem; 
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 4px 15px rgba(0, 0, 0, 0.6);
            margin-top: 60px; 
        }

        .collection-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px 20px;
            font-size: 0.95rem;
            font-weight: 400;
            color: #fff;
        }

        .sort-label {
            color: #fff;
            letter-spacing: 0.5px;
        }

        .sort-select {
            background: transparent;
            color: #fff;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            padding-left: 5px;
            outline: none;
        }

        .sort-select option {
            background-color: #000;
            color: #fff;
        }

        .products-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 5% 80px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            column-gap: 30px;
            row-gap: 50px;
        }

        .product-card {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px); 
        }

        .product-image-wrapper {
            width: 100%;
            height: 280px;      
            background-color: #fff; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            margin-bottom: 20px;
            aspect-ratio: 1 / 1; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.03), 
                        inset 0 0 15px rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden; 
        }

        .product-card:hover .product-image-wrapper {
            box-shadow: 0 12px 30px rgba(255, 255, 255, 0.08), 
                        inset 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .product-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .product-card:hover .product-image-wrapper img {
            transform: scale(1.04);
        }

        .product-title {
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.5;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            max-width: 90%;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        .product-card:hover .product-title {
            color: #f5b95c;
        }

        .product-price {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

         .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 25;
        }

        .menu-toggle span {
            width: 100%;
            height: 2px;
            background-color: #fff;
            transition: all 0.3s ease;
        }


        @media (max-width: 1200px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr); 
                column-gap: 20px;
            }
        }

        @media (max-width: 1024px) {
            .banner-title {
                font-size: 3.5rem;
            }
            .navbar {
                padding: 20px 5%;
            }
            .nav-links a {
                margin: 0 10px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex; 
            }

            .nav-links {
                position: fixed;
                top: 0;
                left: -100%;
                width: 80%;
                max-width: 300px;
                height: 100vh;
                background-color: #090909;
                border-right: 1px solid #222;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: flex-start;
                padding: 40px;
                gap: 30px;
                z-index: 20;
                transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            }

            .nav-links.open {
                left: 0;
            }

            .nav-links a {
                margin: 0;
                font-size: 1.1rem;
                letter-spacing: 2px;
                width: 100%;
                padding-bottom: 8px;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }

            .menu-toggle.open span:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }
            .menu-toggle.open span:nth-child(2) {
                opacity: 0;
            }
            .menu-toggle.open span:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }

            .search-container.active .search-input-field {
                width: 130px; 
            }

            .banner-title {
                font-size: 2.3rem;
                letter-spacing: 2px;
            }

            .product-grid {
                grid-template-columns: repeat(2, 1fr); 
                column-gap: 15px;
                row-gap: 35px;
            }

            .product-image-wrapper {
                height: auto;
                padding: 15px;
            }

            .product-price {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="logo">
            <a href="undisputed.html" class="logo-wrapper">
                <img src="assets/undisputed_logo.png" alt="Undisputed Logo" style="height: 100px; width: auto;">
            </a>
        </div>

        <nav class="nav-links">
            <a href="all products.html">ALL PRODUCTS</a>
            <a href="gloves.html">GLOVES</a>
            <a href="protection.html">PROTECTION</a>
            <a href="footwear.html">FOOTWEAR</a>
        </nav>
        <div class="nav-icons">
            <div class="search-container" id="searchContainer">
                <input type="text" class="search-input-field" id="searchInput" placeholder="SEARCH FOOTWEAR...">
                <a href="#" id="searchToggleBtn" aria-label="Search">
                    <img src="assets/search-icon.png" alt="Search">
                </a>
            </div>

            <a href="account.html" aria-label="Profile">
                <img src="assets/account-icon.png" alt="Account">
            </a>
            <a href="cart.html" aria-label="Cart">
                <div class="cart-icon-wrapper">
                    <img src="assets/cart-icon.png" alt="Cart">
                    <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
                </div>
            </a>
        </div>
    </header>

    <section class="collection-banner">
        <h1 class="banner-title">FOOTWEAR</h1>
    </section>

    <div class="collection-controls">
        <span class="sort-label">Sort by: </span>
        <select class="sort-select" id="sortSelect" aria-label="Sort products">
            <option value="featured">Featured</option>
            <option value="price-low-high">Price, low to high</option>
            <option value="price-high-low">Price, high to low</option>
            <option value="alphabetical">Alphabetical, A - Z</option>
        </select>
    </div>

     <main class="products-container">
        <div class="product-grid" id="productGrid">

            <a href="hyperKO2.html" class="product-card" data-price="11799" data-title="NIKE HYPERKO 2 Boxing Shoes" data-index="1">
                <div class="product-image-wrapper">
                    <img src="assets/hyperko 2 black.jpeg" alt="NIKE HYPERKO 2 Boxing Shoes">
                </div>
                <h2 class="product-title">NIKE HYPERKO 2 Boxing Shoes</h2>
                <span class="product-price">₱11,799.00</span>
            </a>

            <a href="machomai.html" class="product-card" data-price="8499" data-title="NIKE MACHOMAI 3 Boxing Shoes" data-index="2">
                <div class="product-image-wrapper">
                    <img src="assets/NIKE MACHOMAI 3 Boxing Shoes.png" alt="NIKE MACHOMAI 3 Boxing Shoes">
                </div>
                <h2 class="product-title">NIKE MACHOMAI 3 Boxing Shoes</h2>
                <span class="product-price">₱8,499.00</span>
            </a>

            <a href="everlastshoe.html" class="product-card" data-price="7499" data-title="Elite 2 Boxing Shoes Everlast" data-index="3">
                <div class="product-image-wrapper">
                    <img src="assets/Elite 2 Boxing Shoes.png" alt="Elite 2 Boxing Shoes">
                </div>
                <h2 class="product-title">Elite 2 Boxing Shoes</h2>
                <span class="product-price">₱7,499.00</span>
            </a>

              <a href="rivalboots.html" class="product-card" data-price="9999" data-title="Rival RSX-Guerrero 03 High-Top Boxing Boots" data-index="4">
                <div class="product-image-wrapper">
                    <img src="assets/rivalshoe-black.png" alt="RSX-Guerrero 03 High-Top Boxing Boots">
                </div>
                <h2 class="product-title">RSX-Guerrero 03 High-Top Boxing Boots</h2>
                <span class="product-price">₱9,999.00</span>
            </a>

        </div> 
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.querySelector('.nav-links'); 

            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                menuToggle.classList.toggle('open');
                navLinks.classList.toggle('open');
            });

            document.addEventListener('click', (e) => {
                if (!navLinks.contains(e.target) && !menuToggle.contains(e.target)) {
                    menuToggle.classList.remove('open');
                    navLinks.classList.remove('open');
                }
            });
            const sortSelect = document.getElementById('sortSelect');
            const productGrid = document.getElementById('productGrid');
            const searchContainer = document.getElementById('searchContainer');
            const searchToggleBtn = document.getElementById('searchToggleBtn');
            const searchInput = document.getElementById('searchInput');
            
            const products = Array.from(productGrid.querySelectorAll('.product-card'));

            function filterProducts() {
                const query = searchInput.value.trim().toLowerCase();
                
                products.forEach(product => {
                    const title = product.getAttribute('data-title').toLowerCase();
                    if (title.includes(query)) {
                        product.style.display = 'flex'; 
                    } else {
                        product.style.display = 'none'; 
                    }
                });
            }

            searchToggleBtn.addEventListener('click', (e) => {
                e.preventDefault();
                searchContainer.classList.toggle('active');
                if (searchContainer.classList.contains('active')) {
                    searchInput.focus();
                } else {
                    searchInput.value = '';
                    filterProducts(); 
                }
            });

            searchInput.addEventListener('input', filterProducts);
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    filterProducts();
                    searchInput.blur(); 
                }
            });

      
            document.addEventListener('click', (e) => {
                if (!searchContainer.contains(e.target) && searchContainer.classList.contains('active')) {
                    searchContainer.classList.remove('active');
                }
            });

            sortSelect.addEventListener('change', (e) => {
                const criterion = e.target.value;

                products.sort((cardA, cardB) => {
                    const priceA = parseFloat(cardA.getAttribute('data-price'));
                    const priceB = parseFloat(cardB.getAttribute('data-price'));
                    const titleA = cardA.getAttribute('data-title').toLowerCase();
                    const titleB = cardB.getAttribute('data-title').toLowerCase();
                    const indexA = parseInt(cardA.getAttribute('data-index'));
                    const indexB = parseInt(cardB.getAttribute('data-index'));

                    if (criterion === 'price-low-high') {
                        return priceA - priceB;
                    } else if (criterion === 'price-high-low') {
                        return priceB - priceA;
                    } else if (criterion === 'alphabetical') {
                        return titleA.localeCompare(titleB);
                    } else if (criterion === 'featured') {
                        return indexA - indexB;
                    }
                    return 0;
                });

                productGrid.innerHTML = '';
                products.forEach(product => productGrid.appendChild(product));
            });

            updateCartBadgeCount();

            function updateCartBadgeCount() {
                const cartBadge = document.getElementById('cartBadge');
                if (!cartBadge) return;

                const cart = JSON.parse(localStorage.getItem('undisputedCart')) || [];
                const totalItems = cart.reduce((total, item) => total + (item.quantity || 0), 0);

                if (totalItems > 0) {
                    cartBadge.textContent = totalItems;
                    cartBadge.style.display = 'flex';
                } else {
                    cartBadge.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
