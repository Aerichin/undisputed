<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Undisputed</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0e0e0e; 
            color: #fff; 
            overflow-x: hidden;
            overflow-y: scroll; 
        }

        .navbar {
            position: relative; 
            background-color: #0b0a08; 
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 5%;
            z-index: 10;
            border-bottom: 1px solid #222;
            overflow: hidden; 
        }

        .navbar::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.daznservices.com/di/library/DAZN_News/60/63/naoya-inoue-celebration-getty-ftr_1mfvvkpdvhatg1m230gm6k0kye.jpg?t=1093973425') center center/cover no-repeat;
            opacity: 0.25; 
            z-index: -1; 
        }

        .logo, .nav-links, .nav-icons {
            position: relative;
            z-index: 2;
        }

        .logo-wrapper {
            display: inline-block;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            margin: 0 18px;
            letter-spacing: 1.5px;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s ease;
        }

        .nav-links a:hover {
            border-bottom: 2px solid #fff;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center; 
        }

        .nav-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            position: relative; 
        }

        .nav-icons img {
            height: 22px; 
            width: auto;
            object-fit: contain;
            filter: invert(0); 
        }

        .nav-icons a:hover {
            transform: scale(1.15);
        }

        .cart-badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background-color: #f5b95c;
            color: #000;
            font-size: 0.7rem;
            font-weight: 900;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
            border: 1.5px solid #0b0a08;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        .cart-badge.active {
            opacity: 1;
            transform: scale(1);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 25;
        }

        .menu-toggle span {
            width: 100%;
            height: 2px;
            background-color: #fff;
            transition: all 0.3s ease;
        }

        .cart-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 5%;
        }

        .cart-header {
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #fff;
        }

        .cart-subheader {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 30px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cart-layout-container {
            display: flex;
            gap: 5%;
            align-items: flex-start;
        }

        .cart-items-list {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cart-item-card {
            background-color: #111;
            border: 1px solid #222;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
        }

        .cart-item-image-box {
            width: 120px;
            height: 120px;
            background-color: #ececec;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .cart-item-image-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
            margin-bottom: 5px;
            max-width: 85%;
            color: #fff;
        }

        .cart-item-price {
            font-size: 0.95rem;
            font-weight: 700;
            color: #f5b95c;
            margin-bottom: 8px;
        }

        .cart-item-variants {
            font-size: 0.85rem;
            color: #a0a0a0;
            font-weight: 400;
        }

        .trash-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background: none;
            border: none;
            cursor: pointer;
            outline: none;
            transition: transform 0.1s ease;
        }

        .trash-btn:hover {
            transform: scale(1.15);
        }

        .trash-btn img {
            width: 22px;
            height: auto;
            filter: invert(1);
        }

        .cart-qty-controls-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 15px;
            margin-top: -15px;
        }

        .cart-qty-label {
            font-size: 0.85rem;
            color: #a0a0a0;
            font-weight: 400;
            text-transform: uppercase;
        }

        .cart-qty-wrapper {
            display: inline-flex;
            align-items: center;
            background-color: #fff;
            border-radius: 20px;
            padding: 2px 8px;
        }

        .cart-qty-btn {
            background: none;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            padding: 2px 10px;
            color: #000;
            outline: none;
        }

        .cart-qty-number {
            font-size: 0.9rem;
            font-weight: 700;
            min-width: 25px;
            text-align: center;
            color: #000;
        }

        .cart-summary-sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            padding-top: 40px;
        }

        .subtotal-container {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
            text-transform: uppercase;
            color: #fff;
        }

        .subtotal-container span {
            font-weight: 900;
            font-size: 2.2rem;
            margin-left: 10px;
            color: #fff;
        }

        .checkout-action-btn {
            background-color: #f5b95c;
            color: #000;
            border: none;
            width: 100%;
            max-width: 320px;
            padding: 16px 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.2s, transform 0.1s;
        }

        .checkout-action-btn:hover {
            background-color: #e0aa53;
        }

        .checkout-action-btn:active {
            transform: scale(0.98);
        }

        .empty-cart-msg {
            font-size: 1.2rem;
            font-weight: 700;
            color: #a0a0a0;
            padding: 40px 0;
        }

        .checkout-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .checkout-modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .checkout-modal-card {
            background-color: #111;
            border: 2px solid #222;
            width: 90%;
            max-width: 500px;
            padding: 40px 30px;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .checkout-modal-overlay.open .checkout-modal-card {
            transform: translateY(0);
        }

        .close-modal-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .close-modal-btn:hover {
            color: #fff;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
            color: #f5b95c;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }

        .modal-subtitle {
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .payment-options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .payment-option-label {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: #181818;
            border: 1px solid #282828;
            padding: 16px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .payment-option-label:hover {
            border-color: #f5b95c;
            background-color: #1c1a16;
        }

        .payment-option-label input[type="radio"] {
            accent-color: #f5b95c;
            width: 18px;
            height: 18px;
        }

        .qr-display-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            background-color: #181818;
            border: 1px dashed #f5b95c;
            padding: 20px;
            margin-top: -15px;
            margin-bottom: 25px;
            border-radius: 5px;
            text-align: center;
        }

        .qr-display-wrapper img {
            width: 160px;
            height: 160px;
            background-color: #fff;
            padding: 8px;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .qr-display-wrapper p {
            font-size: 0.8rem;
            color: #a0a0a0;
            font-weight: 400;
            line-height: 1.4;
        }

        .proceed-checkout-btn {
            background-color: #f5b95c;
            color: #000;
            border: none;
            width: 100%;
            padding: 16px 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            transition: background-color 0.2s;
        }

        .proceed-checkout-btn:hover {
            background-color: #e0aa53;
        }

        @media (max-width: 1024px) {
            .navbar {
                padding: 20px 5%;
            }
            .nav-links a {
                margin: 0 10px;
                font-size: 0.8rem;
            }
            .cart-layout-container {
                gap: 3%;
            }
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: flex; 
            }

            .nav-links {
                position: fixed;
                top: 0;
                left: -100%;
                width: 80%;
                max-width: 300px;
                height: 100vh;
                background-color: #090909;
                border-right: 1px solid #222;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: flex-start;
                padding: 40px;
                gap: 30px;
                z-index: 20;
                transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            }

            .nav-links.open {
                left: 0;
            }

            .nav-links a {
                margin: 0;
                font-size: 1.1rem;
                letter-spacing: 2px;
                width: 100%;
                padding-bottom: 8px;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }

            .menu-toggle.open span:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }
            .menu-toggle.open span:nth-child(2) {
                opacity: 0;
            }
            .menu-toggle.open span:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }

            .cart-layout-container {
                flex-direction: column;
                align-items: stretch;
                gap: 40px;
            }

            .cart-item-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 45px 20px 20px 20px; 
                position: relative !important; 
            }

            .cart-item-image-box {
                width: 100%;
                height: 200px;
            }

            .trash-btn {
                position: absolute !important;
                top: 15px !important;
                right: 15px !important;
                z-index: 5 !important;
                display: block !important;
            }

            .cart-qty-controls-row {
                justify-content: flex-start;
                margin-top: 15px;
                width: 100%;
            }

            .cart-summary-sidebar {
                align-items: fill;
                padding-top: 20px;
                border-top: 1px solid #222;
            }

            .subtotal-container {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .checkout-action-btn {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="logo">
            <a href="undisputed.html" class="logo-wrapper">
                <img src="assets/undisputed_logo.png" alt="Undisputed Logo" style="height: 100px; width: auto;">
            </a>
        </div>
        <nav class="nav-links">
            <a href="all products.html">ALL PRODUCTS</a>
            <a href="gloves.html">GLOVES</a>
            <a href="protection.html">PROTECTION</a>
            <a href="footwear.html">FOOTWEAR</a>
        </nav>
        <div class="nav-icons">
            <a href="all products.html" aria-label="Search"><img src="assets/search-icon.png" alt="Search"></a>
            <a href="account.html" aria-label="Profile"><img src="assets/account-icon.png" alt="Account"></a>
            <a href="cart.html" aria-label="Cart">
                <img src="assets/cart-icon.png" alt="Cart">
                <span class="cart-badge" id="cartBadge">0</span>
            </a>
        </div>
    </header>

    <main class="cart-wrapper">
        <h1 class="cart-header" id="cartCountTitle">Your Cart | 0 Item(s)</h1>
        <div class="cart-subheader">Products</div>

        <div class="cart-layout-container">
            <div class="cart-items-list" id="cartItemsContainer"></div>

            <div class="cart-summary-sidebar">
                <div class="subtotal-container">
                    Subtotal:<span id="cartSubtotalDisplay">₱0.00</span>
                </div>
                <button class="checkout-action-btn" id="openCheckoutModalBtn" type="button">Checkout</button>
            </div>
        </div>
    </main>

    <div class="checkout-modal-overlay" id="checkoutModal">
        <div class="checkout-modal-card">
            <button class="close-modal-btn" id="closeCheckoutModalBtn" type="button">&times;</button>
            <h2 class="modal-title">Checkout Option</h2>
            
            <p class="modal-subtitle">Select Payment Method:</p>
            <div class="payment-options-list">
                <label class="payment-option-label">
                    <input type="radio" name="paymentMethod" value="COD" checked>
                    Cash on Delivery
                </label>
                <label class="payment-option-label">
                    <input type="radio" name="paymentMethod" value="BANK">
                    Bank Transfer
                </label>
            </div>

            <div class="qr-display-wrapper" id="bankQrContainer">
                <img src="assets/qr" alt="Payment QR Code">
                <p>Scan the secure QR Code above with your banking application to initiate deposit transfer verify credentials.</p>
            </div>

            <button class="proceed-checkout-btn" id="finalProceedCheckoutBtn" type="button">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
       
            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.querySelector('.nav-links');

            const cartItemsContainer = document.getElementById('cartItemsContainer');
            const cartCountTitle = document.getElementById('cartCountTitle');
            const cartSubtotalDisplay = document.getElementById('cartSubtotalDisplay');
            const badge = document.getElementById('cartBadge');

            const checkoutModal = document.getElementById('checkoutModal');
            const openCheckoutModalBtn = document.getElementById('openCheckoutModalBtn');
            const closeCheckoutModalBtn = document.getElementById('closeCheckoutModalBtn');
            const finalProceedCheckoutBtn = document.getElementById('finalProceedCheckoutBtn');
            const bankQrContainer = document.getElementById('bankQrContainer');
            const paymentRadios = document.querySelectorAll('input[name="paymentMethod"]');

            let calculatedSubtotal = 0;

            if (menuToggle && navLinks) {
                menuToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    menuToggle.classList.toggle('open');
                    navLinks.classList.toggle('open');
                });

                document.addEventListener('click', (e) => {
                    if (!navLinks.contains(e.target) && !menuToggle.contains(e.target)) {
                        menuToggle.classList.remove('open');
                        navLinks.classList.remove('open');
                    }
                });
            }

            const formatCurrency = (num) => {
                return '₱' + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };

            function updateCartBadge(totalCount) {
                if (!badge) return;
                if (totalCount > 0) {
                    badge.textContent = totalCount;
                    badge.classList.add('active');
                } else {
                    badge.classList.remove('active');
                }
            }

            function renderCart() {
                let cart = JSON.parse(localStorage.getItem('undisputedCart')) || [];
                cartItemsContainer.innerHTML = '';
                
                let totalItemsCount = 0;
                calculatedSubtotal = 0;

                if (cart.length === 0) {
                    cartItemsContainer.innerHTML = '<div class="empty-cart-msg">Your cart is currently empty.</div>';
                    cartCountTitle.textContent = "Your Cart | 0 Item(s)";
                    cartSubtotalDisplay.textContent = formatCurrency(0);
                    updateCartBadge(0);
                    openCheckoutModalBtn.style.opacity = '0.5';
                    openCheckoutModalBtn.style.pointerEvents = 'none';
                    return;
                }

                openCheckoutModalBtn.style.opacity = '1';
                openCheckoutModalBtn.style.pointerEvents = 'auto';

                cart.forEach((item, index) => {
                    totalItemsCount += item.quantity;
                    calculatedSubtotal += (item.price * item.quantity);

                    const itemCard = document.createElement('div');
                    itemCard.className = 'cart-item-card';
                    itemCard.innerHTML = `
                        <div class="cart-item-image-box">
                            <img src="${item.image}" alt="${item.title}">
                        </div>
                        <div class="cart-item-details">
                            <h2 class="cart-item-title">${item.title}</h2>
                            <div class="cart-item-price">₱${item.price.toLocaleString('en-US', { minimumFractionDigits: 2 })}</div>
                            <div class="cart-item-variants">Color: ${item.color} &nbsp; Size: ${item.size}</div>
                            
                            <div class="cart-qty-controls-row">
                                <span class="cart-qty-label">Quantity:</span>
                                <div class="cart-qty-wrapper">
                                    <button class="cart-qty-btn minus-item" data-index="${index}">—</button>
                                    <span class="cart-qty-number">${item.quantity}</span>
                                    <button class="cart-qty-btn plus-item" data-index="${index}">+</button>
                                </div>
                            </div>
                        </div>
                        <button class="trash-btn delete-item" data-index="${index}" title="Remove Item">
                            <img src="https://cdn-icons-png.flaticon.com/512/3096/3096673.png" alt="Delete">
                        </button>
                    `;
                    cartItemsContainer.appendChild(itemCard);
                });

                cartCountTitle.textContent = `Your Cart | ${totalItemsCount} Item(s)`;
                cartSubtotalDisplay.textContent = formatCurrency(calculatedSubtotal);

                updateCartBadge(totalItemsCount);
                bindActionButtons();
            }

            function bindActionButtons() {
                let cart = JSON.parse(localStorage.getItem('undisputedCart')) || [];

                document.querySelectorAll('.plus-item').forEach(button => {
                    button.addEventListener('click', () => {
                        const idx = button.getAttribute('data-index');
                        cart[idx].quantity++;
                        localStorage.setItem('undisputedCart', JSON.stringify(cart));
                        renderCart();
                    });
                });

                document.querySelectorAll('.minus-item').forEach(button => {
                    button.addEventListener('click', () => {
                        const idx = button.getAttribute('data-index');
                        if (cart[idx].quantity > 1) {
                            cart[idx].quantity--;
                            localStorage.setItem('undisputedCart', JSON.stringify(cart));
                            renderCart();
                        }
                    });
                });

                document.querySelectorAll('.delete-item').forEach(button => {
                    button.addEventListener('click', () => {
                        const idx = button.getAttribute('data-index');
                        cart.splice(idx, 1);
                        localStorage.setItem('undisputedCart', JSON.stringify(cart));
                        renderCart();
                    });
                });
            }

            openCheckoutModalBtn.addEventListener('click', () => {
                checkoutModal.classList.add('open');
            });

            closeCheckoutModalBtn.addEventListener('click', () => {
                checkoutModal.classList.remove('open');
            });

            paymentRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (e.target.value === 'BANK') {
                        bankQrContainer.style.display = 'flex';
                    } else {
                        bankQrContainer.style.display = 'none';
                    }
                });
            });

            finalProceedCheckoutBtn.addEventListener('click', () => {
                const firstName = localStorage.getItem('undisputed_firstName') || 'Valued';
                const lastName = localStorage.getItem('undisputed_lastName') || 'Customer';
                const emailAddress = localStorage.getItem('undisputed_email') || '';

                if (!emailAddress) {
                    alert('No linked account email found! Please register an account profile signature via login page first before finishing registration.');
                    checkoutModal.classList.remove('open');
                    window.location.href = 'account.html';
                    return;
                }

                const selectedMethodInput = document.querySelector('input[name="paymentMethod"]:checked');
                const paymentMethodText = selectedMethodInput.value === 'BANK' ? 'Bank Transfer' : 'Cash on Delivery (COD)';

                let cart = JSON.parse(localStorage.getItem('undisputedCart')) || [];

                let receiptBodyText = `UNDISPUTED STORE OFFICIAL RECEIPT\n`;
                receiptBodyText += `====================================\n`;
                receiptBodyText += `CUSTOMER NAME: ${firstName} ${lastName}\n`;
                receiptBodyText += `PAYMENT METHOD: ${paymentMethodText}\n`;
                receiptBodyText += `====================================\n\n`;
                receiptBodyText += `ORDER DETAIL LOGS:\n`;

                cart.forEach((item) => {
                    receiptBodyText += `- ${item.title} (x${item.quantity})\n`;
                    receiptBodyText += `  Specs: Variant ${item.color} | Size ${item.size}\n`;
                    receiptBodyText += `  Price: ₱${(item.price * item.quantity).toLocaleString('en-US', { minimumFractionDigits: 2 })}\n\n`;
                });

                receiptBodyText += `------------------------------------\n`;
                receiptBodyText += `TOTAL ORDER PRICE: ₱${calculatedSubtotal.toLocaleString('en-US', { minimumFractionDigits: 2 })}\n`;
                receiptBodyText += `====================================\n`;
                receiptBodyText += `Thank you for shopping at Undisputed! Your combat gear is pending verification.`;

                const mailSubject = encodeURIComponent("Your Undisputed Order Receipt");
                const mailBody = encodeURIComponent(receiptBodyText);
                
                window.location.href = `mailto:${emailAddress}?subject=${mailSubject}&body=${mailBody}`;

                localStorage.removeItem('undisputedCart');
                checkoutModal.classList.remove('open');
                renderCart();
            });

            renderCart();
        });
    </script>
</body>
</html>
